    <circle cx="15" cy="45" r="5"/>
  </g>
  <path d="M43.8 31.1 A9 9 0 1 1 32.2 31.1" fill="none" stroke="currentColor"
        stroke-width="4" stroke-linecap="round"/>
  <path d="M40.1 28 L47.5 29 L42.4 35.2 Z" fill="currentColor" stroke="currentColor"
